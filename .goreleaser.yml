version: 2

project_name: treex

before:
  hooks:
    - go mod tidy
    - go generate ./...
    # Generate man pages before archiving. The binary isn't needed for this.
    - mkdir -p man/man1
    - go run ./cmd/treex man --path ./man/man1/

builds:
  - env:
      - CGO_ENABLED=0
    main: ./cmd/treex
    binary: treex
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    # This hook runs *after* the binary is built.
    hooks:
      post:
        - cmd: sh -c 'mkdir -p completions && {{ .Path }} completion bash > completions/treex.bash && {{ .Path }} completion zsh > completions/_treex && {{ .Path }} completion fish > completions/treex.fish'

archives:
  - format: tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
    format_overrides:
      - goos: windows
        format: zip
    files:
      - README.md
      - LICENSE
      - src: docs/**/*
        dst: docs
      # Now these directories will exist and be correctly archived.
      - src: completions/*
        dst: completions
      - src: man/man1/*
        dst: man/man1

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"

# Homebrew formula automation
homebrew_casks:
  - name: treex
    repository:
      owner: arthur-debert
      name: homebrew-tools
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"

    directory: Casks

    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com

    homepage: "https://github.com/arthur-debert/treex"
    description: "A CLI file viewer for annotated file trees"
    license: "MIT"

    # This is the correct, simple syntax. It tells Homebrew where
    # to find the files inside the archive.
    manpage: "man/man1/treex.1"
    binary: "treex"
    completions:
      bash: "completions/treex.bash"
      zsh: "completions/_treex"
      fish: "completions/treex.fish"
