version: 2

project_name: treex

builds:
  - id: treex
    main: ./cmd/treex
    binary: treex
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}
    env: ["CGO_ENABLED=0"]
    goos: [linux, windows, darwin]
    goarch: [amd64, arm64]
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip
    files:
      - "README.md"
      - "LICENSE"
      - "completions/treex.bash"
      - "completions/_treex"
      - "completions/treex.fish"
      - "man/man1/*"

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"

brews:
  - name: treex
    repository:
      owner: arthur-debert
      name: homebrew-tools
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: "Formula"
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    homepage: "https://github.com/arthur-debert/treex"
    description: "A CLI file viewer for annotated file trees"
    license: "MIT"
    test: |
      system "#{bin}/treex --version"
    install: |
      bin.install "treex"
      man1.install "man/man1/treex.1"
      bash_completion.install "completions/treex.bash" => "treex"
      zsh_completion.install "completions/_treex" => "_treex"
      fish_completion.install "completions/treex.fish"
