version: 2

project_name: treex

before:
  hooks:
    # Keep this minimal. Only run commands that don't need the final binary.
    - go mod tidy
    - go generate ./...

builds:
  # This build runs on the native GoReleaser environment (macOS)
  # and is responsible for generating the files for the archive.
  - id: treex-native
    env: ["CGO_ENABLED=0"]
    main: ./cmd/treex
    binary: treex
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos: [darwin]
    goarch: [amd64, arm64]
    hooks:
      post:
        - "mkdir -p completions man/man1"
        - "{{ .Path }} man --path ./man/man1/"
        - "{{ .Path }} completion bash > completions/treex.bash"
        - "{{ .Path }} completion zsh > completions/_treex"
        - "{{ .Path }} completion fish > completions/treex.fish"

  # This build cross-compiles for other platforms but does *not*
  # run the hooks, avoiding the "exec format error".
  - id: treex-cross
    env: ["CGO_ENABLED=0"]
    main: ./cmd/treex
    binary: treex
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos: [linux, windows]
    goarch: [amd64, arm64]
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - format: tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
    format_overrides:
      - goos: windows
        format: zip
    files:
      - README.md
      - LICENSE
      - src: docs/**/*
        dst: docs
      # These directories are now guaranteed to exist before archiving.
      - src: completions/*
        dst: completions
      - src: man/man1/*
        dst: man/man1

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"

# Homebrew formula automation
homebrew_casks:
  - name: treex
    repository:
      owner: arthur-debert
      name: homebrew-tools
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"

    directory: Casks

    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com

    homepage: "https://github.com/arthur-debert/treex"
    description: "A CLI file viewer for annotated file trees"
    license: "MIT"

    # This is the correct, simple syntax. It tells Homebrew where
    # to find the files inside the archive.
    manpage: "man/man1/treex.1"
    binary: "treex"
    completions:
      bash: "completions/treex.bash"
      zsh: "completions/_treex"
      fish: "completions/treex.fish"
